% rebase('base.html', title="Media Control")

<main class="grid">
% for item in display_items:
    <button class="media-item" onclick="triggerCommand(`{{item['file']}}`)">
        % if item['type'] == 'video':
            <img src="/thumbnails/{{item['thumb']}}">
        % else:
            <img src="/media/{{item['file']}}">
        % end
        <span class="filename-banner">{{item['file']}}</span>
    </button>
% end
</main>

<style>
.media-item {
	position: relative;
	overflow: hidden;
}

.filename-banner {
	position: absolute;
	bottom: 0;
	left: 0;
	right: 0;
	background-color: rgba(0, 0, 0, 0.6);
	color: white;
	padding: 8px;
	font-size: 12px;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	font-weight: 500;
}
</style>

<script>
function triggerCommand(filename) {
    fetch('/run-media', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ file: filename })
    })
    .then(response => response.text())
    .then(data => {
        console.log("Command executed:", data);
    })
    .catch(err => console.error(err));
}
</script>
