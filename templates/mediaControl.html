% rebase('base.html', title="Media Control")

<main class="grid">
% for item in display_items:
    <button class="media-item" onclick="toggleItem(`{{item['file']}}`, event)">
        % if item['type'] == 'video':
            <img src="/thumbnails/{{item['thumb']}}">
        % else:
            <img src="/media/{{item['file']}}">
        % end
        <span class="filename-banner">{{item['file']}}</span>
        <div class="delete-indicator"></div>
    </button>
% end
<button class="delete-mode-btn" onclick="toggleDeleteMode()">Delete Mode</button>
</main>

<style>
.media-item {
	position: relative;
	overflow: hidden;
}

.filename-banner {
	position: absolute;
	bottom: 0;
	left: 0;
	right: 0;
	background-color: rgba(0, 0, 0, 0.6);
	color: white;
	padding: 8px;
	font-size: 12px;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	font-weight: 500;
}
.delete-indicator {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    border: 2px solid white;
    border-radius: 50%;
    display: none;
    background-color: rgba(0, 0, 0, 0.5);
}

.delete-indicator.marked {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: rgba(76, 175, 80, 0.8);
}

.delete-indicator.marked::after {
    content: "✓";
    color: white;
    font-size: 16px;
    font-weight: bold;
}

.media-item.delete-mode .delete-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
}

.delete-mode-btn {
    grid-column: 1 / -1;
    padding: 12px 24px;
    background-color: #f44336;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
}

.delete-mode-btn.active {
    background-color: #d32f2f;
}

.delete-mode-btn:hover {
    opacity: 0.9;
}

main.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
}
</style>

<script>
let deleteMode = false;
let markedItems = new Set();

function toggleDeleteMode() {

    if (markedItems.size > 0){
        confirmDelete();
    }

    deleteMode = !deleteMode;
    markedItems.clear();
    
    const btn = document.querySelector('.delete-mode-btn');
    const items = document.querySelectorAll('.media-item');
    
    if (deleteMode) {
        btn.classList.add('active');
        items.forEach(item => item.classList.add('delete-mode'));
    } else {
        btn.classList.remove('active');
        btn.textContent = 'Delete Mode';
        items.forEach(item => {
            item.classList.remove('delete-mode');
            item.classList.remove('marked');
            item.querySelector('.delete-indicator').classList.remove('marked');
        });
    }
}

function toggleItem(filename, event) {
    event.preventDefault();
    if (!deleteMode) {
        // Normal mode - trigger command
        triggerCommand(filename);
    } else {
        // Delete mode - mark/unmark item
        const btn = event.target.closest('.media-item');
        const indicator = btn.querySelector('.delete-indicator');
        
        if (markedItems.has(filename)) {
            markedItems.delete(filename);
            indicator.classList.remove('marked');
        } else {
            markedItems.add(filename);
            indicator.classList.add('marked');
        }
        updateDeleteButtonText();
    }
}

function updateDeleteButtonText() {
    const deleteBtn = document.querySelector('.delete-mode-btn');
    
    if (markedItems.size > 0) {
        deleteBtn.textContent = `Delete ${markedItems.size} item(s)`;
    } else {
        deleteBtn.textContent = 'Delete Mode';
    }
}

function triggerCommand(filename) {
    fetch('/run-media', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ file: filename })
    })
    .then(response => response.text())
    .then(data => {
        console.log("Command executed:", data);
    })
    .catch(err => console.error(err));
}

function confirmDelete() {
    if (markedItems.size === 0) {
        alert("No items selected for deletion");
        return;
    }
    
    const count = markedItems.size;
    const confirmed = confirm(`Are you sure you want to delete ${count} item(s)? This cannot be undone.`);
    
    if (confirmed) {
        deleteMarkedItems();
    }
}

function deleteMarkedItems() {
    const filenames = Array.from(markedItems);
    fetch('/delete', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ files: filenames })
    })
    .then(response => response.json())
    .then(data => {
        console.log("Delete response:", data);
        location.reload();
    })
    .catch(err => console.error("Delete error:", err));
}
</script>
