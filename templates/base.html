<!DOCTYPE html>
<html>
<head>
    <title>Rpi-led-control</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/images/hoolacane-logo.ico">
</head>
<body>
<header>
    <div class="burger-menu menu-wrapper">
        <button id="menu-btn">&#9776;</button>
        <nav id="menu" class="hidden">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/mediaControl">Media Control</a></li>
                <li><a href="/config">Config</a></li>
            </ul>
            <ul>
                <li><a href="/strobe">Strobe</a></li>
                <li><a href="/mediaUpload">Upload media</a></li>
            </ul>
        </nav>
    </div>
    <div class="brightness-wrapper">
        <span class="slider-title">Brightness:</span> <label for="brightness-slider" id="brightness-label">100%</label>
        <input type="range" id="brightness-slider" min="10" max="100" step="10" value="100">
    </div>
    <button id="stop-btn">STOP</button>
</header>

<div class="content">
    {{!base}}
</div>
<style>
    header {
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #333;
        color: white;
        padding: 10px 20px;
    }

    nav {
        display: none;        
        min-width: 150px;
        border-radius: 5px;
        overflow: hidden;
        position: absolute;
        background: #333;
        border: 5px #555;
        border-style: solid;
    }

    nav.show {
        display: flex;
    }

    nav a {
        color: white;
        text-decoration: none;
        padding: 10px;
        display: block;
    }

    #stop-btn {
        background: red;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
        margin-left: 20px;
    }

    #menu-btn {
        font-size: 24px;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
    }

    .menu-wrapper {
        position: relative;
    }

    #menu {
        display: none;    
    }

    #menu.show {
        display: flex;
    }

    #menu a {
        color: white;
        text-decoration: none;
        padding: 10px;
    }
    .brightness-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
        margin-right: 12px;
    }
    #brightness-label {
        color: white;
        font-size: 14px;
        min-width: 36px;
        text-align: right;
    }
    #brightness-slider {
        width: 120px;
        cursor: pointer;
    }
    .slider-title {
        color: #ccc; 
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('menu-btn');
    const menu = document.getElementById('menu');

    btn.addEventListener('click', () => {
        menu.classList.toggle('show');
    });

    const stopBtn = document.getElementById('stop-btn');
    stopBtn.addEventListener('click', () => {
        fetch('/stop_media', { method: 'POST' });
    });

    const slider = document.getElementById('brightness-slider');
    const label = document.getElementById('brightness-label');

    const initializeSlider = () => {
        label.textContent = `${slider.value}%`;
    };
    initializeSlider();

    slider.addEventListener('input', () => {
        label.textContent = `${slider.value}%`;
    });

    slider.addEventListener('change', () => {
        fetch('/set_brightness', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ brightness: parseInt(slider.value) })
        });
    });
});
</script>
</body>
</html>
